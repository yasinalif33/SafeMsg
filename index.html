<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="https://i.postimg.cc/KYdbfhf0/shield.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>SafeMsg | Pro Fiverr Companion</title>
</head>
<body>
    <div class="app-wrapper">
        <header class="top-nav">
            <div class="nav-brand">
                <img class="logo" id="mainLogo" src="https://i.postimg.cc/4xysbrnq/softy-black.png" alt="Softy">
                <span class="divider"></span>
                <h1 class="app-title">SafeMsg Companion</h1>
            </div>
            
            <div class="nav-right">
                <div class="nav-warning">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    <span>Double-check final output.</span>
                </div>
                <button class="theme-btn" id="themeToggle" title="Toggle Dark Mode">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <main class="workspace">
            <section class="panel input-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2>Raw Message</h2>
                        <span class="badge" id="inputCount">0 Words</span>
                    </div>
                    <div class="panel-actions">
                        <button class="btn btn-icon" onclick="pasteToInput()" title="Paste">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Paste
                        </button>
                        <button class="btn btn-icon btn-danger" onclick="clearInput()" title="Clear">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="editor-container">
                    <textarea id="inputText" placeholder="Start typing or paste your client message here... Live processing is on." autofocus></textarea>
                </div>
            </section>

            <section class="panel output-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2>Safe Output</h2>
                        <span class="badge badge-green" id="outputCount">0 Words</span>
                    </div>
                    <div class="panel-actions">
                        <label class="toggle-switch" title="Toggle Highlights">
                            <input type="checkbox" id="highlightToggle" checked>
                            <span class="slider"></span>
                        </label>
                        <button class="btn btn-primary" id="copyBtn" onclick="copyOutput()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy Safe Text
                        </button>
                    </div>
                </div>
                <div class="editor-container">
                    <div class="output-box" id="outputText">
                        <div class="empty-state">Your safe, compliant text will appear here instantly...</div>
                    </div>
                </div>
                <div id="restrictedAlert" class="alert-bar hidden">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <div class="alert-content">
                        <strong>Secured:</strong> <span id="flaggedList"></span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
